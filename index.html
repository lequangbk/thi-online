<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi Online</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #74b9ff, #a29bfe);
}

.container {
  padding: 20px;
}

.header {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
  color: white;
}

.main {
  display: flex;
  gap: 20px;
}

.left, .right {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.left {
  flex: 2;
}

.right {
  flex: 1;
  text-align: center;
}

video {
  width: 100%;
  border-radius: 10px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #00b894;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00a383;
}

.timer {
  font-size: 28px;
  color: red;
  margin: 20px 0;
}

.warning {
  margin-top: 20px;
  padding: 15px;
  background: #ffeaa7;
  border-radius: 10px;
  text-align: center;
}

#status {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    📝 Bài thi siêu cấp đáng yêu 😎
  </div>

  <div class="main">

    <div class="left">
      <button onclick="startExam()">
        <i class="fa-solid fa-play"></i> Bắt đầu làm bài
      </button>

      <div class="timer">
        ⏰ <span id="timer">50:00</span>
      </div>

      <div id="status"></div>

      <button onclick="submitExam()">
        <i class="fa-solid fa-paper-plane"></i> Nộp bài
      </button>
    </div>

    <div class="right">
      <h3><i class="fa-solid fa-camera"></i> Camera 😎</h3>
      <video id="video" autoplay muted></video>
    </div>

  </div>

  <div class="warning">
    🚨 Camera đang nhìn bạn đó 👀 Đừng gian lận nha!
  </div>

</div>

<script>
let stream;
let time = 3000; // 50 phút
let timerInterval;
let captureInterval;

// 🎥 start
async function startExam() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  document.getElementById("video").srcObject = stream;

  document.getElementById("status").innerText = "🔴 Đang ghi hình (timelapse)...";

  startTimer();
  startCapture();
}

// ⏱ timer
function startTimer() {
  timerInterval = setInterval(() => {
    if (time <= 0) {
      submitExam();
      return;
    }

    time--;

    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      `${min}:${sec < 10 ? "0" : ""}${sec}`;
  }, 1000);
}

// 📸 chụp mỗi 5s
function startCapture() {
  const video = document.getElementById("video");

  captureInterval = setInterval(() => {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async (blob) => {
      const formData = new FormData();
      formData.append("file", blob, "frame.jpg");

      await fetch("https://thi-online.onrender.com/upload", {
        method: "POST",
        body: formData
      });
    }, "image/jpeg", 0.6);

  }, 5000); // 5 giây
}

// 📤 submit
function submitExam() {
  clearInterval(timerInterval);
  clearInterval(captureInterval);

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  alert("Đã nộp bài!");
}

// 🚫 rời tab
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    alert("Bạn vừa rời tab!");
  }
});
</script>

</body>
</html>
