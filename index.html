<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi Online</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f6fa;
}

.container {
  padding: 20px;
}

/* HEADER */
.header {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* MAIN */
.main {
  display: flex;
  gap: 20px;
}

/* LEFT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.timer-box {
  font-size: 28px;
  margin: 20px 0;
  color: red;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #0984e3;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0652dd;
}

/* RIGHT */
.right {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

video {
  width: 100%;
  border-radius: 10px;
}

/* WARNING */
.warning {
  margin-top: 20px;
  padding: 15px;
  background: #ffeaa7;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">📄 Bài làm</div>

  <div class="main">

    <!-- LEFT -->
    <div class="left">
      <button onclick="startExam()">Bắt đầu làm bài</button>

      <div class="timer-box">
        ⏱ Thời gian: <span id="timer">05:00</span>
      </div>

      <button onclick="submitExam()">Nộp bài</button>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h3>🎥 Camera</h3>
      <video id="video" autoplay muted></video>
    </div>

  </div>

  <div class="warning">
    ⚠️ Không rời khỏi màn hình trong quá trình làm bài
  </div>

</div>

<script>
let mediaRecorder;
let chunks = [];
let time = 300; // 5 phút
let timerInterval;

// 🎥 Bắt đầu thi
async function startExam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("video").srcObject = stream;

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    chunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "video/webm" });

    const formData = new FormData();
    formData.append("file", blob, "record.webm");

    await fetch("https://thi-online.onrender.com/upload", {
      method: "POST",
      body: formData
    });

    alert("Đã nộp bài!");
  };

  mediaRecorder.start();

  startTimer();
}

// ⏱ Timer
function startTimer() {
  timerInterval = setInterval(() => {
    if (time <= 0) {
      clearInterval(timerInterval);
      submitExam(); // tự nộp
      return;
    }

    time--;

    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      `${min}:${sec < 10 ? "0" : ""}${sec}`;
  }, 1000);
}

// 📤 Nộp bài
function submitExam() {
  clearInterval(timerInterval);

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
}

// 🚫 Rời tab cảnh báo
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    alert("Bạn vừa rời khỏi tab!");
  }
});
</script>

</body>
</html>
